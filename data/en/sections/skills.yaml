# Your Skills
skills:
  - name: DevSecOps & CI/CD
    summary: 'Build and secure delivery pipelines end to end, with security checks integrated at every stage rather than bolted on at the end. Tools: GitHub Actions, Jenkins, Harness, Ansible, SonarQube, Black Duck.'

  - name: Cloud Platforms
    summary: 'Design and operate cloud infrastructure across AWS and Azure, from serverless functions to managed Kubernetes clusters. Infrastructure provisioned as code using Terraform and CloudFormation. AWS Certified Solutions Architect – Associate.'

  - name: Containers & Orchestration
    summary: 'Run containerised workloads in production using Docker and Kubernetes, including building clusters from scratch with networking, storage, observability, and Helm-based deployment pipelines.'

  - name: Backend Development
    summary: 'Build microservices and APIs that are reliable, secure, and easy to maintain. Primarily in Node.js and .NET, with experience in Flask and Microsoft Graph API integration.'

  - name: Databases
    summary: 'Work across relational and NoSQL databases depending on what the problem calls for. Hands-on with MSSQL, MySQL, MongoDB, DynamoDB, and Redis, including query optimisation and schema design.'

  - name: Programming Languages
    summary: 'Primarily C# and JavaScript (Node.js) for application code, Python for scripting and tooling, Bash and YAML for automation and infrastructure, and React for front-end work.'
