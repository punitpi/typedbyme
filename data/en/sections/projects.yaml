# your projects
projects:
  - name: LGTM Observability Stack on Kubernetes
    role: Creator
    timeline: '2025'
    # repo: https://github.com/punitpi/lgtm-observability  # Add once repo is created
    summary: Built a production-grade observability platform from scratch on Azure Kubernetes Service using the LGTM stack (Loki, Grafana, Tempo, Mimir). Covers metrics, logs, traces, and alerting. Azure infrastructure provisioned with Terraform and all components packaged into a custom umbrella Helm chart for repeatable deployments.
    tags: ['Kubernetes', 'Grafana', 'Helm', 'Terraform', 'Azure', 'Observability', 'DevOps']

  - name: Homelab Infrastructure
    role: Creator
    timeline: '2024 - Present'
    repo: https://github.com/punitpi/homelab
    summary: Infrastructure-as-code for a reproducible, resilient personal homelab. Local-first architecture on Raspberry Pi with automated deployment via Ansible and Docker Compose. Features Traefik reverse proxy, Authentik SSO, Tailscale mesh networking, and automated Restic backups to Backblaze B2. Runs services like AdGuard Home, FreshRSS, Mealie, and OpenWebUI.
    tags: ['Docker', 'Ansible', 'Raspberry Pi', 'Tailscale', 'Self-Hosting', 'Infrastructure', 'Automation']

  - name: TypedByMe Portfolio
    role: Creator
    timeline: '2024 - Present'
    repo: https://github.com/punitpi/typedbyme
    summary: Personal portfolio and technical blog built with Hugo and the Toha v4 theme. Features dark mode support, GoatCounter analytics, integrated Spotify Now Playing bar, and optimized static site generation. Content managed through YAML config files and markdown posts.
    tags: ['Hugo', 'JavaScript', 'SCSS', 'Static Site', 'Portfolio', 'Blog']

  - name: Spotify Now Playing API
    role: Creator
    timeline: '2024'
    repo: https://github.com/punitpi/spotify-now-playing
    summary: Lightweight proxy service for Spotify's Currently Playing API. Handles OAuth token refresh and exposes a simple JSON endpoint with track metadata. Deployable on Cloudflare Workers, Vercel or any other service. Includes CORS support and optional 30-second caching to avoid rate limits.
    tags: ['JavaScript', 'Node.js', 'Cloudflare Workers', 'Spotify API', 'Docker']

  - name: My Express Template
    role: Creator
    timeline: '2023'
    repo: https://github.com/punitpi/my-express-template
    summary: Standard Express.js template with custom configurations and best practices for rapid API development. Includes authentication, error handling, and logging setup.
    tags: ['JavaScript', 'Node.js', 'Express.js', 'Backend']

  - name: Scotland Yard Tracker
    role: Developer
    timeline: '2022'
    repo: https://github.com/punitpi/scotland-yard-tracker
    summary: Web app to help players track Mr. X's movements and deduce possible locations during a Scotland Yard board game session.
    tags: ['JavaScript', 'Web App']

  - name: Adhoc Scripts
    role: Creator
    timeline: '2020 - Present'
    repo: https://github.com/punitpi/adhoc-scripts
    summary: A growing collection of shell scripts for automation, system administration, and development workflow tasks.
    tags: ['Shell', 'Bash', 'Automation', 'DevOps']
