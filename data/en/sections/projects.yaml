# your projects
projects:
  - name: LGTM Observability Stack on Kubernetes
    role: Creator
    timeline: '2025'
    # repo: https://github.com/punitpi/lgtm-observability  # Add once repo is created
    summary: Built a production-grade observability platform from scratch on Azure Kubernetes Service using the LGTM stack (Loki, Grafana, Tempo, Mimir). Covers metrics, logs, traces, and alerting. Azure infrastructure provisioned with Terraform and all components packaged into a custom umbrella Helm chart for repeatable deployments.
    tags: ['Kubernetes', 'Grafana', 'Helm', 'Terraform', 'Azure', 'Observability', 'DevOps']

  - name: My Express Template
    # logo: /images/sections/projects/nodejs.png  # Add logo later
    role: Creator
    timeline: '2023'
    repo: https://github.com/punitpi/my-express-template
    summary: Standard Express.js template with custom configurations and best practices for rapid API development. Includes authentication, error handling, and logging setup.
    tags: ['JavaScript', 'Node.js', 'Express.js', 'Backend']

  - name: Scotland Yard Tracker
    role: Developer
    timeline: '2022'
    repo: https://github.com/punitpi/scotland-yard-tracker
    summary: Web app to help players track Mr. X's movements and deduce possible locations during a Scotland Yard board game session.
    tags: ['JavaScript', 'Web App']

  - name: Adhoc Scripts
    role: Creator
    timeline: '2020 - Present'
    repo: https://github.com/punitpi/adhoc-scripts
    summary: A growing collection of shell scripts for automation, system administration, and development workflow tasks.
    tags: ['Shell', 'Bash', 'Automation', 'DevOps']
